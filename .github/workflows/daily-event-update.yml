name: Daily Event Update

on:
  schedule:
    # Run daily at 23:30 CET (22:30 UTC in winter, 21:30 UTC in summer)
    - cron: '30 21 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Install AI scraper dependencies
        run: |
          npm install --save-dev openai @anthropic-ai/sdk tsx
      
      - name: Run AI Event Scraper
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AI_PROVIDER: ${{ secrets.AI_PROVIDER || 'openai' }}
        run: npx tsx scripts/ai-event-scraper.ts
      
      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code src/data/events.ts || echo "changes=true" >> $GITHUB_OUTPUT
      
      - name: Create Pull Request
        if: steps.git-check.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: '🤖 AI: Add new events'
          title: '🤖 [AI] New Events - $(date +%Y-%m-%d)'
          body: |
            ## 🤖 Automated Event Update
            
            This PR was automatically generated by the AI Event Scraper.
            
            ### What changed?
            - New yoga/wellness events added to `src/data/events.ts`
            - Events were rated by AI based on quality criteria
            - Only events with rating ≥ 3.0 stars were included
            
            ### Review Checklist
            - [ ] Verify event details are accurate
            - [ ] Check that dates are correct
            - [ ] Confirm source URLs are valid
            - [ ] Review AI ratings and reasons
            - [ ] Ensure no duplicates were added
            
            ### Auto-merge Policy
            This PR requires manual review before merging.
            
            ---
            Generated on: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
            AI Provider: ${{ secrets.AI_PROVIDER || 'openai' }}
          branch: ai-event-update-${{ github.run_number }}
          delete-branch: true
          labels: |
            automated
            events
            ai-generated
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::AI Event Scraper failed. Check logs for details."
